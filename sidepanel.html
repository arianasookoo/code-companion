<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Companion</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <div class="header-brand">
      <img class="mascot" src="mascot.png" alt="Coco, the Code Companion mascot" />
      <div class="header-titles">
        <h1>Coding Companion</h1>
        <div class="profile-hint">Meet Coco!</div>
      </div>
    </div>
    <button id="settingsToggleBtn" title="User settings">⚙</button>
  </header>

  <p id="apiKeyStatus" class="hint" style="margin: 0 16px 8px;"></p>

  <!-- User information / settings -->
  <section id="settings" class="hidden">
    <div class="settings-card">
      <h2 class="container-title">Track your LeetCode progress</h2>
      <p class="hint">Add your LeetCode username to see your daily goal and stats right here in the panel.</p>
      <label for="settingsLcUsername">LeetCode username</label>
      <input type="text" id="settingsLcUsername" placeholder="e.g. johndoe" autocomplete="off" />
      <label for="settingsDailyGoal">Daily goal (problems/day)</label>
      <input type="number" id="settingsDailyGoal" min="1" step="1" placeholder="5" />
      <div class="row">
        <button id="settingsSaveBtn" class="primary">Save</button>
      </div>
      <button id="settingsSkipBtn" class="link-btn">Not interested — don't ask again</button>
      <p id="settingsStatus" class="hint"></p>
    </div>
  </section>

  <main class="panel">
    <!-- Capture / analyze area -->
    <section class="container" id="captureSection">
      <h2 class="container-title">Coding</h2>
      <div class="row">
        <button id="captureBtn" class="primary">⤓ Capture code from page</button>
        <button id="clearCodeBtn" class="icon-btn" title="Clear code box">🗑</button>
      </div>
      <p id="captureInfo" class="hint"></p>
      <textarea id="codeBox" placeholder="Captured code appears here — or paste code manually. Highlight code on the page before capturing to analyze just that part." spellcheck="false"></textarea>
      <div class="row actions">
        <button id="debugBtn" class="action">Debug</button>
        <button id="explainBtn" class="action">Explain</button>
        <button id="optimizeBtn" class="action">Optimize</button>
      </div>
    </section>

    <!-- LeetCode progress -->
    <section class="container" id="leetcodeContainer">
      <h2 class="container-title">LeetCode Progress</h2>
      <p id="leetcodeStatus" class="hint"></p>
      <div id="leetcodeProgress" class="hidden">
        <div class="lc-goal">
          <div class="lc-ring-wrap">
            <svg viewBox="0 0 80 80" class="lc-ring">
              <circle class="lc-ring-track" cx="40" cy="40" r="34"></circle>
              <circle class="lc-ring-progress" id="lcRingProgress" cx="40" cy="40" r="34"></circle>
            </svg>
            <div class="lc-ring-label">
              <span><span id="lcGoalSolved">0</span>/<span id="lcGoalTarget">5</span></span>
              <div class="lc-ring-sub">today</div>
            </div>
          </div>
        </div>
        <div class="lc-total">
          <div class="lc-row-labels">
            <span>Total solved</span>
            <span><span id="lcSolved">0</span> / <span id="lcTotal">0</span></span>
          </div>
          <div class="lc-bar"><div class="lc-bar-fill" id="lcTotalFill"></div></div>
        </div>
        <div class="lc-breakdown">
          <div class="lc-diff">
            <div class="lc-row-labels small"><span>Easy</span><span id="lcEasyLabel">0/0</span></div>
            <div class="lc-bar small"><div class="lc-bar-fill easy" id="lcEasyFill"></div></div>
          </div>
          <div class="lc-diff">
            <div class="lc-row-labels small"><span>Medium</span><span id="lcMedLabel">0/0</span></div>
            <div class="lc-bar small"><div class="lc-bar-fill medium" id="lcMedFill"></div></div>
          </div>
          <div class="lc-diff">
            <div class="lc-row-labels small"><span>Hard</span><span id="lcHardLabel">0/0</span></div>
            <div class="lc-bar small"><div class="lc-bar-fill hard" id="lcHardFill"></div></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Conversation -->
    <section id="chat"></section>
  </main>

  <!-- Follow-up input -->
  <!-- <footer>
    <textarea id="followUp" rows="1" placeholder="Ask a follow-up question…"></textarea>
    <button id="sendBtn" class="primary" title="Send">➤</button>
  </footer> -->

  <script src="sidepanel.js"></script>
</body>
</html>
